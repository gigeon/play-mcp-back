spring:
  application:
    name: play-mcp-back

  ai:
    mcp:
      server:
        name: play-mcp-back
        version: 0.0.1
        type: SYNC
        protocol: STREAMABLE
        tool-change-notification: true
        streamable-http:
          mcp-endpoint: /mcp
          keep-alive-interval: 30s

server:
  port: 8000
  address: 0.0.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

api:
  youth:
    baseUrl: https://www.youthcenter.go.kr/go/ythip
  saramin:
    baseUrl: https://oapi.saramin.co.kr/job-search

logging:
  level:
    org.springframework.ai.mcp: INFO
