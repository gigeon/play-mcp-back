spring:
  application:
    name: play-mcp-back

  ai:
    mcp:
      server:
        name: play-mcp-back
        version: 0.0.1
        type: SYNC
        protocol: STREAMABLE
        tool-change-notification: true
        streamable-http:
          mcp-endpoint: /mcp
          keep-alive-interval: 30s

server:
  port: 8000
  address: 0.0.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

api:
  baseUrl: https://www.youthcenter.go.kr/go/ythip
  key: e92bf925-3d3c-4ef0-8bf9-6e976cc440be

  kakao:
    url: https://kapi.kakao.com/v2/api/talk/calendar

logging:
  level:
    org.springframework.ai.mcp: INFO
